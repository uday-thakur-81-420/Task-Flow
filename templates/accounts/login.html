{% extends 'base.html' %}
{% block title %}Login{% endblock %}

{% block auth_content %}
<div class="min-vh-100 d-flex align-items-center justify-content-center" style="background: var(--bg);">
  <div class="auth-card">
    <div class="text-center mb-4">
      <div class="auth-logo">TaskFlow</div>
      <div class="auth-sub">Sign in to your account</div>
    </div>
    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label fw-semibold" style="font-size:13px;">Username</label>
        <input type="text" name="username" class="form-control" placeholder="Enter username" required>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold" style="font-size:13px;">Password</label>
        <input type="password" name="password" class="form-control" placeholder="Enter password" required>
      </div>
      {% if form.errors %}
        <div class="alert alert-danger py-2" style="font-size:13px;">Invalid username or password.</div>
      {% endif %}
      <button type="submit" class="btn btn-primary w-100 py-2">Sign In</button>
    </form>
    <p class="text-center mt-3" style="font-size:13px; color: var(--muted);">
      Don't have an account? <a href="{% url 'signup' %}" style="color: var(--mid-green);">Sign up</a>
    </p>
  </div>
</div>
{% endblock %}
